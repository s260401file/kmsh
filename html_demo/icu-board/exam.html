<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高雄市立民生醫院 ICU 電子白板 — 檢查/會診</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/exam.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="page-header">
    <div class="header-left">ICU</div>
    <div class="header-center">
      <div class="staff-block"><div class="staff-label">病房主任</div><div class="staff-name" id="ward-director">—</div></div>
      <div class="staff-block"><div class="staff-label">單位護理長</div><div class="staff-name" id="head-nurse">—</div></div>
    </div>
    <div class="header-right">
      <div class="update-label">資料更新時間：剛剛</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-time" id="clock-time"></div>
    </div>
  </header>

  <!-- ── Announcement marquee ── -->
  <div class="announce-bar">
    <span>◆</span>
    <span>2025/05/15 院內感染管制週宣導：請確實執行手部衛生，進出隔離病房務必穿戴適當防護裝備。</span>
  </div>

  <!-- ── Main content ── -->
  <main class="main-content">
    <div class="ec-panel">

      <!-- 面板標題 -->
      <div class="ec-title">
        <span class="ec-title-bar"></span>
        檢查／會診
      </div>

      <!-- 雙欄 -->
      <div class="ec-columns">

        <!-- 左欄：檢查 -->
        <div class="ec-card">
          <div class="ec-card-header">
            檢查
            <span class="ec-card-count" id="ec-exam-count"></span>
          </div>
          <div class="ec-table-wrap">
            <table class="ec-table">
              <thead>
                <tr>
                  <th>床號</th>
                  <th>姓名</th>
                  <th>檢查項目</th>
                  <th>預定日期</th>
                  <th>時段</th>
                  <th class="ec-th-center">狀態</th>
                  <th>備註</th>
                </tr>
              </thead>
              <tbody id="exam-list"></tbody>
            </table>
          </div>
        </div>

        <!-- 右欄：會診 -->
        <div class="ec-card">
          <div class="ec-card-header">
            會診
            <span class="ec-card-count" id="ec-consult-count"></span>
          </div>
          <div class="ec-table-wrap">
            <table class="ec-table">
              <thead>
                <tr>
                  <th>床號</th>
                  <th>姓名</th>
                  <th>會診科別</th>
                  <th>會診醫師</th>
                  <th>完成時間</th>
                  <th class="ec-th-center">狀態</th>
                  <th>備註</th>
                </tr>
              </thead>
              <tbody id="consult-list"></tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- ── Bottom tabs ── -->
  <nav class="bottom-tabs">
    <a href="index.html"      class="tab-btn">病室動態</a>
    <a href="antibiotic.html" class="tab-btn">抗生素</a>
    <a href="tube.html"       class="tab-btn">管路</a>
    <a href="surgery.html"    class="tab-btn">手術資訊</a>
    <a href="exam.html"       class="tab-btn active">檢查/會診</a>
    <a href="contact.html"    class="tab-btn">連絡電話</a>
    <a href="bulletin.html"   class="tab-btn">佈告欄</a>
    <a href="evacuation.html" class="tab-btn">避難圖</a>
  </nav>

  <script src="js/examData.js"></script>
  <script src="js/exam.js"></script>
</body>
</html>
