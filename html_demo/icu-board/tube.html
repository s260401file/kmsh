<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高雄市立民生醫院 ICU 電子白板 — 管路</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/tube.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="page-header">
    <div class="header-left">ICU</div>
    <div class="header-center">
      <div class="staff-block"><div class="staff-label">病房主任</div><div class="staff-name" id="ward-director">—</div></div>
      <div class="staff-block"><div class="staff-label">單位護理長</div><div class="staff-name" id="head-nurse">—</div></div>
    </div>
    <div class="header-right">
      <div class="update-label">資料更新時間：剛剛</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-time" id="clock-time"></div>
    </div>
  </header>

  <!-- ── Announcement marquee ── -->
  <div class="announce-bar">
    <span>◆</span>
    <span>2025/05/15 院內感染管制週宣導：請確實執行手部衛生，進出隔離病房務必穿戴適當防護裝備。</span>
  </div>

  <!-- ── Main content ── -->
  <main class="main-content">
    <div class="tb-panel">

      <div class="tb-title">
        <span class="tb-title-bar"></span>
        管路狀態
      </div>

      <div class="tb-table-wrap">
        <table class="tb-table">
          <thead>
            <tr>
              <th>床號</th>
              <th>病患</th>
              <th>呼吸器<br>(ETT)</th>
              <th>鼻胃管<br>(NG)</th>
              <th>導尿管<br>(Foley)</th>
              <th>中心靜脈<br>(CVC)</th>
              <th>CRRT</th>
            </tr>
          </thead>
          <tbody id="tube-list"></tbody>
        </table>
      </div>

      <div class="tb-stats" id="tb-stats"></div>

    </div>
  </main>

  <!-- ── Bottom tabs ── -->
  <nav class="bottom-tabs">
    <a href="index.html"      class="tab-btn">病室動態</a>
    <a href="antibiotic.html" class="tab-btn">抗生素</a>
    <a href="tube.html"       class="tab-btn active">管路</a>
    <a href="surgery.html"    class="tab-btn">手術資訊</a>
    <a href="exam.html"       class="tab-btn">檢查/會診</a>
    <a href="contact.html"    class="tab-btn">連絡電話</a>
    <a href="bulletin.html"   class="tab-btn">佈告欄</a>
    <a href="evacuation.html" class="tab-btn">避難圖</a>
