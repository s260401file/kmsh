<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高雄市立民生醫院 ICU 電子白板</title>
  <link rel="stylesheet" href="css/variables.css?v=19">
  <link rel="stylesheet" href="css/reset.css?v=19">
  <link rel="stylesheet" href="css/main.css?v=19">
  <link rel="stylesheet" href="css/components.css?v=19">
</head>
<body>

  <!-- ── Header ── -->
  <header class="page-header">
    <div class="header-left">ICU</div>
    <div class="header-center">
      <div class="staff-block">
        <div class="staff-label">病房主任</div>
        <div class="staff-name" id="ward-director">—</div>
      </div>
      <div class="staff-block">
        <div class="staff-label">單位護理長</div>
        <div class="staff-name" id="head-nurse">—</div>
      </div>
    </div>
    <div class="header-right">
      <div class="update-label">資料更新時間：剛剛</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-time" id="clock-time"></div>
    </div>
  </header>

  <!-- ── Announcement marquee ── -->
  <div class="announce-bar">
    <span>◆</span>
    <span>2025/05/15 院內感染管制週宣導：請確實執行手部衛生，進出隔離病房務必穿戴適當防護裝備。</span>
  </div>

  <!-- ── Main content ── -->
  <main class="main-content">

    <!-- 4F section -->
    <div class="floor-section floor-4f">
      <div class="floor-title">▌ 4F　共 20 床</div>
      <div class="floor-beds">
        <div class="grid-4f" id="grid-4f"></div>
      </div>
    </div>

    <!-- 3F section -->
    <div class="floor-section floor-3f">
      <div class="floor-title">▌ 3F　共 5 床</div>
      <div class="floor-beds">
        <div class="grid-3f" id="grid-3f"></div>
      </div>
      <!-- ── Ward Stats Panel ── -->
      <div class="ward-stats">
        <div class="ws-row">
          <div class="ws-item">
            <div class="ws-value" id="stat-total">—</div>
            <div class="ws-label">總床數</div>
          </div>
          <div class="ws-item">
            <div class="ws-value" id="stat-occupied">—</div>
            <div class="ws-label">住院</div>
          </div>
          <div class="ws-item" data-filter="surgery">
            <div class="ws-value ws-surgery" id="stat-surgery">—</div>
            <div class="ws-label">手術</div>
          </div>
          <div class="ws-item" data-filter="exam">
            <div class="ws-value ws-exam" id="stat-exam">—</div>
            <div class="ws-label">檢查</div>
          </div>
          <div class="ws-item" data-filter="consult">
            <div class="ws-value ws-consult" id="stat-consult">—</div>
            <div class="ws-label">會診</div>
          </div>
        </div>
        <div class="ws-row">
          <div class="ws-item" data-filter="cond-a">
            <div class="ws-value ws-sev-a" id="stat-sev-a">—</div>
            <div class="ws-label"><span class="sev-dot sev-dot-a"></span>穩定</div>
          </div>
          <div class="ws-item" data-filter="cond-b">
            <div class="ws-value ws-sev-b" id="stat-sev-b">—</div>
            <div class="ws-label"><span class="sev-dot sev-dot-b"></span>重症</div>
          </div>
          <div class="ws-item" data-filter="cond-c">
            <div class="ws-value ws-sev-c" id="stat-sev-c">—</div>
            <div class="ws-label"><span class="sev-dot sev-dot-c"></span>危急</div>
          </div>
          <div class="ws-item" data-filter="iso">
            <div class="ws-value ws-iso" id="stat-iso">—</div>
            <div class="ws-label">隔離</div>
          </div>
          <div class="ws-item" data-filter="DNR">
            <div class="ws-value ws-dnr" id="stat-dnr">—</div>
            <div class="ws-label">DNR</div>
          </div>
          <div class="ws-item" data-filter="RRT">
            <div class="ws-value ws-rrt" id="stat-rrt">—</div>
            <div class="ws-label">RRT</div>
          </div>
        </div>
        <div class="ws-row">
          <div class="ws-item" data-filter="tube-ett">
            <div class="ws-value ws-ett" id="stat-ett">—</div>
            <div class="ws-label">氣管內管 ▾</div>
          </div>
          <div class="ws-item" data-filter="tube-ng">
            <div class="ws-value ws-ng" id="stat-ng">—</div>
            <div class="ws-label">鼻胃管 ▾</div>
          </div>
          <div class="ws-item" data-filter="tube-foley">
            <div class="ws-value ws-foley" id="stat-foley">—</div>
            <div class="ws-label">導尿管 ▾</div>
          </div>
          <div class="ws-item" data-filter="tube-cvc">
            <div class="ws-value ws-cvc" id="stat-cvc">—</div>
            <div class="ws-label">中心靜脈 ▾</div>
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- ── Filter bar ── -->
  <div class="filter-bar">
    <span class="filter-label">圖例 / 過濾：</span>
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="badge badge-filter badge-DNR"      data-filter="DNR">DNR</button>
    <button class="badge badge-filter badge-高危跌"   data-filter="高危跌">高危跌</button>
    <button class="badge badge-filter badge-依賴L1"   data-filter="依賴L1">依賴L1</button>
    <button class="badge badge-filter badge-依賴L2"   data-filter="依賴L2">依賴L2</button>
    <button class="badge badge-filter badge-依賴L3"   data-filter="依賴L3">依賴L3</button>
    <button class="badge badge-filter badge-隔離"     data-filter="隔離">隔離</button>
    <button class="badge badge-filter badge-保密"     data-filter="保密">保密</button>
    <button class="badge badge-filter badge-禁治療"   data-filter="禁治療">禁治療</button>
    <button class="badge badge-filter badge-禁食"     data-filter="禁食">禁食</button>
    <button class="badge badge-filter badge-過敏"     data-filter="過敏">過敏</button>
    <button class="badge badge-filter badge-RRT"      data-filter="RRT">RRT</button>
    <button class="badge badge-filter badge-化療"     data-filter="化療">化療</button>
    <button class="badge badge-filter badge-輪椅"     data-filter="輪椅">輪椅</button>
    <button class="badge badge-filter badge-推床"     data-filter="推床">推床</button>
    <button class="badge badge-filter badge-氧氣設備" data-filter="氧氣設備">氧氣設備</button>
    <button class="badge badge-filter badge-洗腎"     data-filter="洗腎">洗腎</button>
  </div>

  <!-- ── Bottom tabs ── -->
  <nav class="bottom-tabs">
    <button class="tab-btn active">病室動態</button>
    <button class="tab-btn">抗生素</button>
    <button class="tab-btn">管路</button>
    <button class="tab-btn">手術資訊</button>
    <button class="tab-btn">檢查/會診</button>
    <button class="tab-btn">連絡電話</button>
    <button class="tab-btn">派班資訊</button>
    <button class="tab-btn">佈告欄</button>
    <button class="tab-btn">避難圖</button>
  </nav>

  <!-- ── Bed detail modal ── -->
  <div class="modal-overlay" id="bedModal">
    <div class="modal-box">
      <div class="modal-header">
        <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;">
          <span class="modal-bed-id" id="m-bedid"></span>
          <span class="modal-patient" id="m-name"></span>
          <span class="modal-basic" id="m-basic"></span>
          <div class="modal-badges" id="m-badges"></div>
        </div>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-row">
          <div class="modal-field full">
            <div class="field-label">診斷</div>
            <div class="field-value diagnosis" id="m-diag"></div>
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <div class="field-label">病歷號</div>
            <div class="field-value" id="m-medrec"></div>
          </div>
          <div class="modal-field">
            <div class="field-label">生日</div>
            <div class="field-value" id="m-birth"></div>
          </div>
          <div class="modal-field">
            <div class="field-label">科別</div>
            <div class="field-value" id="m-dept"></div>
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <div class="field-label">主治醫師</div>
            <div class="field-value" id="m-doctor"></div>
          </div>
          <div class="modal-field">
            <div class="field-label">責任護理師</div>
            <div class="field-value" id="m-nurse"></div>
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <div class="field-label">入院日期</div>
            <div class="field-value" id="m-admit"></div>
          </div>
          <div class="modal-field">
            <div class="field-label">住院天數</div>
            <div class="field-value" id="m-days"></div>
          </div>
          <div class="modal-field">
            <div class="field-label">病況等級</div>
            <div class="field-value" id="m-cond"></div>
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <div class="field-label">隔離狀態</div>
            <div class="field-value" id="m-iso"></div>
          </div>
          <div class="modal-field">
            <div class="field-label">DNR</div>
            <div class="field-value" id="m-dnr"></div>
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <div class="field-label">呼吸器</div>
            <div class="field-value" id="m-vent"></div>
          </div>
          <div class="modal-field">
            <div class="field-label">CRRT</div>
            <div class="field-value" id="m-crrt"></div>
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field full">
            <div class="field-label">管路</div>
            <div class="field-value" id="m-tubes" style="font-size:15px;font-weight:400;"></div>
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field full">
            <div class="field-label">備註</div>
            <div class="field-value" id="m-notes" style="font-size:15px;font-weight:400;"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-close-modal" id="modalCloseBtn">關閉</button>
      </div>
    </div>
  </div>

  <script src="js/mockData.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
