<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>急診室 — 檢查/會診</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/exam.css">
</head>
<body>
  <header class="page-header">
    <div class="header-left">ER<span class="ward-sub">急診室</span></div>
    <div class="header-center">
      <div class="staff-block"><div class="staff-label">急診主任</div><div class="staff-name" id="ward-director">—</div></div>
      <div class="staff-block"><div class="staff-label">護理長</div><div class="staff-name" id="head-nurse">—</div></div>
    </div>
    <div class="header-right">
      <div class="update-label">資料更新時間：剛剛</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-time" id="clock-time"></div>
    </div>
  </header>
  <div class="announce-bar">
    <span>🚨</span>
    <span>2026/05/24 急診分流提醒：目前二級危急病人待床中，ICU 床位有限，請優先處理急救室病人轉出作業。</span>
  </div>
  <main class="main-content">
    <div class="ec-panel">
      <div class="ec-page-title">
        <span class="ec-title-accent"></span>
        檢查 / 會診
      </div>
      <div class="ec-columns">
        <!-- 左：檢查 -->
        <div class="ec-card">
          <div class="ec-card-header">
            檢查清單
            <span class="ec-card-count" id="ec-exam-count"></span>
          </div>
          <div class="ec-table-wrap">
            <table class="ec-table">
              <thead>
                <tr>
                  <th>床號</th>
                  <th>病患</th>
                  <th>檢查項目</th>
                  <th>狀態</th>
                  <th>時段</th>
                  <th>備註</th>
                </tr>
              </thead>
              <tbody id="ec-exam-list"></tbody>
            </table>
          </div>
        </div>
        <!-- 右：會診 -->
        <div class="ec-card">
          <div class="ec-card-header">
            會診清單
            <span class="ec-card-count" id="ec-consult-count"></span>
          </div>
          <div class="ec-table-wrap">
            <table class="ec-table">
              <thead>
                <tr>
                  <th>床號</th>
                  <th>病患</th>
                  <th>會診科別</th>
                  <th>會診醫師</th>
                  <th>狀態</th>
                  <th>備註</th>
                </tr>
              </thead>
              <tbody id="ec-consult-list"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
  <nav class="bottom-tabs">
    <a href="index.html"         class="tab-btn">病室動態</a>
    <a href="exam.html"          class="tab-btn active">檢查/會診</a>
    <a href="mass-casualty.html" class="tab-btn">大量傷患</a>
    <a href="contact.html"       class="tab-btn">連絡電話</a>
    <a href="bulletin.html"      class="tab-btn">佈告欄</a>
    <a href="evacuation.html"    class="tab-btn">避難圖</a>
  </nav>
  <script src="js/mockData.js"></script>
  <script src="js/examData.js"></script>
  <script src="js/exam.js"></script>
</body>
</html>
