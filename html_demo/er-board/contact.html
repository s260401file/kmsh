<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>急診室 — 連絡電話</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>
  <header class="page-header">
    <div class="header-left">ER<span class="ward-sub">急診室</span></div>
    <div class="header-center">
      <div class="staff-block"><div class="staff-label">急診主任</div><div class="staff-name" id="ward-director">—</div></div>
      <div class="staff-block"><div class="staff-label">護理長</div><div class="staff-name" id="head-nurse">—</div></div>
    </div>
    <div class="header-right">
      <div class="update-label">資料更新時間：剛剛</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-time" id="clock-time"></div>
    </div>
  </header>
  <div class="announce-bar">
    <span>🚨</span>
    <span>2026/05/24 急診分流提醒：目前二級危急病人待床中，ICU 床位有限，請優先處理急救室病人轉出作業。</span>
  </div>
  <main class="main-content">
    <div class="ct-panel">
      <div class="ct-page-title">
        <span class="ct-title-accent"></span>
        連絡電話
        <span class="ct-title-caption">當日值班＋常用</span>
      </div>
      <div class="ct-columns">
        <!-- 左：當日值班 -->
        <div class="ct-card ct-card-duty">
          <div class="ct-card-header">當日值班</div>
          <div class="ct-table-wrap">
            <table class="ct-table">
              <thead>
                <tr>
                  <th>職務</th>
                  <th>姓名</th>
                  <th>院內分機</th>
                  <th>手機</th>
                  <th>時段</th>
                </tr>
              </thead>
              <tbody id="duty-list"></tbody>
            </table>
          </div>
        </div>
        <!-- 右：常用電話 -->
        <div class="ct-card ct-card-common">
          <div class="ct-card-header">常用連絡電話</div>
          <div class="ct-table-wrap">
            <table class="ct-table">
              <thead>
                <tr>
                  <th>單位 / 科室</th>
                  <th class="ct-col-ext">分機</th>
                </tr>
              </thead>
              <tbody id="common-list"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
  <nav class="bottom-tabs">
    <a href="index.html"         class="tab-btn">病室動態</a>
    <a href="exam.html"          class="tab-btn">檢查/會診</a>
    <a href="mass-casualty.html" class="tab-btn">大量傷患</a>
    <a href="contact.html"       class="tab-btn active">連絡電話</a>
    <a href="bulletin.html"      class="tab-btn">佈告欄</a>
    <a href="evacuation.html"    class="tab-btn">避難圖</a>
  </nav>
  <script src="js/mockData.js"></script>
  <script src="js/contactData.js"></script>
  <script src="js/contact.js"></script>
</body>
</html>
