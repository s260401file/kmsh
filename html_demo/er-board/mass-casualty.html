<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>急診室 — 大量傷患</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/mass-casualty.css">
</head>
<body>
  <header class="page-header">
    <div class="header-left">ER<span class="ward-sub">急診室</span></div>
    <div class="header-center">
      <div class="staff-block"><div class="staff-label">急診主任</div><div class="staff-name" id="ward-director">—</div></div>
      <div class="staff-block"><div class="staff-label">護理長</div><div class="staff-name" id="head-nurse">—</div></div>
    </div>
    <div class="header-right">
      <div class="update-label">資料更新時間：剛剛</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-time" id="clock-time"></div>
    </div>
  </header>
  <div class="announce-bar">
    <span>🚨</span>
    <span>2026/05/24 急診分流提醒：目前二級危急病人待床中，ICU 床位有限，請優先處理急救室病人轉出作業。</span>
  </div>
  <main class="main-content">
    <div class="mc-panel">

      <!-- 統計橫列 -->
      <div class="mc-stats-row">
        <div class="mc-stat-card">
          <div class="mc-stat-val val-total"   id="mc-stat-total">—</div>
          <div class="mc-stat-lbl">病患總數</div>
        </div>
        <div class="mc-stat-card">
          <div class="mc-stat-val val-critical" id="mc-stat-sev-a">—</div>
          <div class="mc-stat-lbl">A級 重症</div>
        </div>
        <div class="mc-stat-card">
          <div class="mc-stat-val val-mid" id="mc-stat-sev-b">—</div>
          <div class="mc-stat-lbl">B級 中症</div>
        </div>
        <div class="mc-stat-card">
          <div class="mc-stat-val val-moderate" id="mc-stat-sev-c">—</div>
          <div class="mc-stat-lbl">C級 輕症</div>
        </div>
        <div class="mc-stat-card">
          <div class="mc-stat-val val-dead"     id="mc-stat-dead">—</div>
          <div class="mc-stat-lbl">死亡</div>
        </div>
        <div class="mc-stat-card">
          <div class="mc-stat-val val-transfer" id="mc-stat-transfer">—</div>
          <div class="mc-stat-lbl">轉出</div>
        </div>
      </div>

      <!-- 病患列表 -->
      <div class="mc-table-wrap">
        <table class="mc-table">
          <thead>
            <tr>
              <th>床號</th>
              <th>病患</th>
              <th>病歷號</th>
              <th>分級</th>
              <th>科別</th>
              <th>診斷</th>
              <th>到達</th>
              <th>病人註記</th>
            </tr>
          </thead>
          <tbody id="mc-list"></tbody>
        </table>
      </div>

    </div>
  </main>
  <nav class="bottom-tabs">
    <a href="index.html"         class="tab-btn">病室動態</a>
    <a href="exam.html"          class="tab-btn">檢查/會診</a>
    <a href="mass-casualty.html" class="tab-btn active">大量傷患</a>
    <a href="contact.html"       class="tab-btn">連絡電話</a>
    <a href="bulletin.html"      class="tab-btn">佈告欄</a>
    <a href="evacuation.html"    class="tab-btn">避難圖</a>
  </nav>
  <script src="js/mockData.js"></script>
  <script src="js/mass-casualty.js"></script>
</body>
</html>
