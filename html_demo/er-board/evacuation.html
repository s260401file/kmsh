<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>急診室 — 避難圖</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/evacuation.css">
</head>
<body>
  <header class="page-header">
    <div class="header-left">ER<span class="ward-sub">急診室</span></div>
    <div class="header-center">
      <div class="staff-block"><div class="staff-label">急診主任</div><div class="staff-name" id="ward-director">—</div></div>
      <div class="staff-block"><div class="staff-label">護理長</div><div class="staff-name" id="head-nurse">—</div></div>
    </div>
    <div class="header-right">
      <div class="update-label">資料更新時間：剛剛</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-time" id="clock-time"></div>
    </div>
  </header>
  <div class="announce-bar">
    <span>🚨</span>
    <span>2026/05/24 急診分流提醒：目前二級危急病人待床中，ICU 床位有限，請優先處理急救室病人轉出作業。</span>
  </div>
  <main class="main-content" style="padding:0;overflow:hidden;">
    <div class="ev-panel">
      <div class="ev-title">
        <span class="ev-title-bar"></span>
        避難圖
        <span class="ev-title-meta" id="ev-floor-info"></span>
      </div>
      <div class="ev-columns">

        <!-- 左欄：急診室平面示意 -->
        <div class="ev-map-wrap">
          <div class="ev-floor-plan-title">1F 急診室平面示意</div>
          <div class="ev-floor-plan">
            <div class="ev-floor-label">急診室（19 床）</div>
            <div class="ev-er-grid">
              <div class="ev-er-zone ev-zone-station" style="grid-column:span 3">
                護理站 / 分診台
                <span class="ev-zone-sub">Nursing Station</span>
              </div>
              <div class="ev-er-zone">急救區<span class="ev-zone-sub">1床</span></div>
              <div class="ev-er-zone">負壓隔離<span class="ev-zone-sub">2床</span></div>
              <div class="ev-er-zone ev-zone-exit">東側出口<span class="ev-zone-sub">急救入口</span></div>
              <div class="ev-er-zone">第一診療<span class="ev-zone-sub">5床</span></div>
              <div class="ev-er-zone">第二診療<span class="ev-zone-sub">6床</span></div>
              <div class="ev-er-zone ev-zone-exit">西側出口<span class="ev-zone-sub">一般出口</span></div>
              <div class="ev-er-zone">留觀區<span class="ev-zone-sub">2床</span></div>
              <div class="ev-er-zone">待床區<span class="ev-zone-sub">3床</span></div>
              <div class="ev-er-zone ev-zone-exit">集合點<span class="ev-zone-sub">院門前廣場</span></div>
            </div>
            <div class="ev-exit-arrow">
              <span class="ev-arrow">↓</span>
              <span class="ev-arrow-label">避難方向 → 院門前廣場</span>
            </div>
          </div>
          <div class="ev-legend">
            <div class="ev-legend-item"><span class="ev-legend-dot dot-zone"></span>診療區</div>
            <div class="ev-legend-item"><span class="ev-legend-dot dot-station"></span>護理站</div>
            <div class="ev-legend-item"><span class="ev-legend-dot dot-exit"></span>出口 / 集合點</div>
          </div>
        </div>

        <!-- 右欄：設備 + 緊急聯絡 -->
        <div class="ev-side">
          <div class="ev-card">
            <div class="ev-card-header">
              避難設備清單
              <span class="ev-card-count" id="ev-equip-count"></span>
            </div>
            <div class="ev-equip-list" id="equip-list"></div>
          </div>
          <div class="ev-card">
            <div class="ev-card-header">緊急聯絡</div>
            <div class="ev-contacts" id="emerg-contacts"></div>
          </div>
        </div>

      </div>
    </div>
  </main>
  <nav class="bottom-tabs">
    <a href="index.html"         class="tab-btn">病室動態</a>
    <a href="exam.html"          class="tab-btn">檢查/會診</a>
    <a href="mass-casualty.html" class="tab-btn">大量傷患</a>
    <a href="contact.html"       class="tab-btn">連絡電話</a>
    <a href="bulletin.html"      class="tab-btn">佈告欄</a>
    <a href="evacuation.html"    class="tab-btn active">避難圖</a>
  </nav>
  <script src="js/mockData.js"></script>
  <script src="js/evacuationData.js"></script>
  <script src="js/evacuation.js"></script>
</body>
</html>
