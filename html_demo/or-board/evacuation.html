<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手術室 — 避難圖</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/evacuation.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="page-header">
    <div class="header-left">OR
      <span class="ward-sub">手術室</span>
    </div>
    <div class="header-center">
      <div class="staff-block">
        <div class="staff-label">手術室主任</div>
        <div class="staff-name" id="ward-director">—</div>
      </div>
      <div class="staff-block">
        <div class="staff-label">護理長</div>
        <div class="staff-name" id="head-nurse">—</div>
      </div>
    </div>
    <div class="header-right">
      <div class="update-label">資料更新時間：剛剛</div>
      <div class="clock-date" id="clock-date"></div>
      <div class="clock-time" id="clock-time"></div>
    </div>
  </header>

  <!-- ── Announcement marquee ── -->
  <div class="announce-bar">
    <span>🔔</span>
    <span>2026/05/24 手術室公告：今日共安排 7 台手術，OR-04 MVR 預計 13:00 完成，ICU 床位已預留，相關科別請備妥接收。</span>
  </div>

  <!-- ── Main content ── -->
  <main class="main-content">
    <div class="ev-panel">

      <!-- 面板標題 -->
      <div class="ev-title">
        <span class="ev-title-bar"></span>
        避難圖
        <span class="ev-title-meta" id="ev-floor-info"></span>
      </div>

      <!-- 雙欄 -->
      <div class="ev-columns">

        <!-- 左欄：OR 平面示意圖 -->
        <div class="ev-map-wrap">

          <div class="ev-floor-plan-title">5F 手術室平面示意</div>

          <div class="ev-floor-plan">
            <div class="ev-floor-label">手術室（OR-01 ～ OR-07）</div>
            <div class="ev-stairs">樓梯間</div>
            <div class="ev-or-grid">
              <div class="ev-or-room">OR-01</div>
              <div class="ev-or-room">OR-02</div>
              <div class="ev-or-room">OR-03</div>
              <div class="ev-or-room">OR-04</div>
              <div class="ev-or-room">OR-05</div>
              <div class="ev-or-room">OR-06</div>
              <div class="ev-or-room">OR-07</div>
              <div class="ev-or-room ev-or-exit">緊急出口</div>
            </div>
            <div class="ev-exit-arrow">
              <span class="ev-arrow">↓</span>
              <span class="ev-arrow-label">避難方向 → 1F 集合點</span>
            </div>
          </div>

          <!-- 圖例 -->
          <div class="ev-legend">
            <div class="ev-legend-item">
              <span class="ev-legend-dot dot-room"></span>手術室
            </div>
            <div class="ev-legend-item">
              <span class="ev-legend-dot dot-exit"></span>緊急出口
            </div>
            <div class="ev-legend-item">
              <span class="ev-legend-dot dot-stairs"></span>樓梯間
            </div>
          </div>

        </div>

        <!-- 右欄：設備清單 + 緊急聯絡 -->
        <div class="ev-side">

          <!-- 緊急設備 -->
          <div class="ev-card">
            <div class="ev-card-header">
              避難設備清單
              <span class="ev-card-count" id="ev-equip-count"></span>
            </div>
            <div class="ev-equip-list" id="equip-list"></div>
          </div>

          <!-- 緊急聯絡 -->
          <div class="ev-card">
            <div class="ev-card-header">緊急聯絡</div>
            <div class="ev-contacts" id="emerg-contacts"></div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <!-- ── Bottom tabs ── -->
  <nav class="bottom-tabs">
    <a href="index.html"      class="tab-btn">手術動態</a>
    <a href="schedule.html"   class="tab-btn">手術派班</a>
    <a href="handover.html"   class="tab-btn">特殊交班</a>
    <a href="contact.html"    class="tab-btn">連絡電話</a>
    <a href="bulletin.html"   class="tab-btn">佈告欄</a>
    <a href="evacuation.html" class="tab-btn active">避難圖</a>
  </nav>

  <script src="js/mockData.js"></script>
  <script src="js/evacuationData.js"></script>
  <script src="js/evacuation.js"></script>
</body>
</html>
